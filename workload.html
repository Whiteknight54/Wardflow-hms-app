<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n-page-title="page_title_app">WardFlow: Admissions & Team Tracking</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="app">
    <div id="topbar-slot"></div>
    <div id="statsbar-slot"></div>

    <div class="main">
      <div id="sidebar-slot"></div>

      <div class="content">
        <div class="page active" id="page-workload">
          <div class="page-header">
            <h2 data-i18n="workload_title">Team Workload</h2>
            <p data-i18n="workload_desc">Monitor patient assignments and team capacity</p>
            <div id="workloadScopeBadge" class="scope-pill" style="display:none;"></div>
          </div>
          <div class="team-grid" id="teamGrid"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="modals-slot"></div>

  <script src="components.js"></script>
  <script src="data.js"></script>
  <script>
    injectComponents('workload');
  </script>
  <script src="auth.js"></script>
  <script src="ui.js"></script>
  <script src="actions.js"></script>
  <script src="modals.js"></script>
  <script src="admin.js"></script>
  <script src="script.js"></script>
</body>
</html>
