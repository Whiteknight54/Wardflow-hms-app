version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: wardflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: wardflow
    ports:
      - "5433:5432"
    volumes:
      - wardflow_data:/var/lib/postgresql/data
      - ./backend/sql:/docker-entrypoint-initdb.d
    networks:
      - pgnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d wardflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: wardflow-api
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      # Override DATABASE_URL to use the Docker service name, not localhost
      DATABASE_URL: postgresql://admin:password123@postgres:5432/wardflow
    ports:
      - "8001:8000"
    networks:
      - pgnet
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: wardflow-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@wardflow.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5051:80"
    networks:
      - pgnet
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: nginx:1.27-alpine
    container_name: wardflow-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "5500:80"
    networks:
      - pgnet
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/login.html || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  wardflow_data:

networks:
  pgnet:
    driver: bridge
