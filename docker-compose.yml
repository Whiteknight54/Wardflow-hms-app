version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: wardflow-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: wardflow
    ports:
      - "5433:5432"
    volumes:
      - wardflow_data:/var/lib/postgresql/data
      - ./backend/sql:/docker-entrypoint-initdb.d
    networks:
      - pgnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d wardflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: wardflow-api
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://admin:password123@postgres:5432/wardflow
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5500,http://127.0.0.1:5500,null}
      JWT_SECRET: ${JWT_SECRET:-test-secret-change-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES:-120}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      OTP_RESEND_MIN_SECONDS: ${OTP_RESEND_MIN_SECONDS:-30}
      RESET_TOKEN_EXPIRES_MINUTES: ${RESET_TOKEN_EXPIRES_MINUTES:-30}
      RESET_REQUEST_MIN_SECONDS: ${RESET_REQUEST_MIN_SECONDS:-60}
      OTP_DEV_FALLBACK: ${OTP_DEV_FALLBACK:-false}
      BOOTSTRAP_ADMIN_EMAILS: ${BOOTSTRAP_ADMIN_EMAILS:-admin@wardflow.com,wardflowhms@gmail.com}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-password123}
    ports:
      - "8001:8000"
    networks:
      - pgnet
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: wardflow-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@wardflow.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5051:80"
    networks:
      - pgnet
    depends_on:
      - postgres

  frontend:
    image: nginx:1.27-alpine
    container_name: wardflow-frontend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "5500:80"
    networks:
      - pgnet
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/login.html || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  wardflow_data:

networks:
  pgnet:
    driver: bridge
  # pgnet_test network removed
