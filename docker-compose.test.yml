services:
  postgres:
    image: postgres:15-alpine
    container_name: wardflow-test-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: wardflow
    ports:
      - "5433:5432"
    volumes:
      - wardflow_test_data:/var/lib/postgresql/data
      - ./backend/sql:/docker-entrypoint-initdb.d
    networks:
      - pgnet_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d wardflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: wardflow-test-api
    environment:
      DATABASE_URL: postgresql://admin:password123@postgres:5432/wardflow
      CORS_ORIGINS: http://localhost:5500,http://127.0.0.1:5500,http://localhost:5501,http://127.0.0.1:5501,null
      JWT_SECRET: test-secret-change-in-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRES_MINUTES: 120
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USERNAME: wardflowhms@gmail.com
      SMTP_PASSWORD: "lare jwqf ovsi mraf"
      SMTP_FROM_EMAIL: wardflowhms@gmail.com
      SMTP_USE_TLS: "true"
      OTP_EXPIRES_MINUTES: 10
      OTP_RESEND_MIN_SECONDS: 30
      RESET_TOKEN_EXPIRES_MINUTES: 30
      RESET_REQUEST_MIN_SECONDS: 60
      OTP_DEV_FALLBACK: "false"
      OTP_ALWAYS_REQUIRED: "false"
    ports:
      - "8001:8000"
    networks:
      - pgnet_test
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: wardflow-test-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@wardflow.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5051:80"
    networks:
      - pgnet_test
    depends_on:
      - postgres

  frontend:
    image: nginx:1.27-alpine
    container_name: wardflow-test-frontend
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "5500:80"
    networks:
      - pgnet_test
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/login.html || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  wardflow_test_data:

networks:
  pgnet_test:
    driver: bridge
